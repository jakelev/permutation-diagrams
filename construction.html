<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TCCW Construction</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="wide">
    <nav class="page-nav">
      <a href="index.html">&larr; Single diagram</a>
      <strong>TCCW construction</strong>
      <span class="info" tabindex="0"
        title="From TCCW diagrams w (size n) and v (size m) and an n-subset X of {2,…,n+m+1}, build the TCCW diagram u = w' 1 v' of size n+m+1.">&#9432;</span>
    </nav>

    <section class="controls-compact">
      <div class="cbar">
        <label class="cbar-label" for="w-input" title="Reversed if needed so w₁ ≤ wₙ.">w</label>
        <input id="w-input" type="text" spellcheck="false" autocomplete="off" placeholder="231" />
        <input id="n-slider" type="range" min="0" max="10" step="1" value="3" />
        <span class="muted-inline">n = <span id="n-value">3</span></span>
        <button id="rand-w" class="primary">Random TCCW</button>
      </div>
      <div class="cbar">
        <label class="cbar-label" for="v-input" title="Reversed if needed so v₁ ≥ vₘ.">v</label>
        <input id="v-input" type="text" spellcheck="false" autocomplete="off" placeholder="12" />
        <input id="m-slider" type="range" min="0" max="10" step="1" value="3" />
        <span class="muted-inline">m = <span id="m-value">3</span></span>
        <button id="rand-v" class="primary">Random TCCW</button>
      </div>
      <div class="cbar">
        <label class="cbar-label" for="x-input" title="X ⊆ {2,…,n+m+1}, |X| = n; complement is Y.">X</label>
        <input id="x-input" type="text" spellcheck="false" autocomplete="off" placeholder="2 4 5" />
        <span class="muted-inline" id="x-req"></span>
        <button id="rand-x">Random X</button>
      </div>
    </section>

    <div id="error" class="error" style="display:none"></div>

    <div class="canvas-toolbar">
      <label class="toggle-all-label"><input type="checkbox" id="check-tccw" /> Check TCCW</label>
      <label class="hl-label"><input type="checkbox" id="hl-w" /> <span class="sw sw-w"></span> w-subdiagram (mountains X)</label>
      <label class="hl-label"><input type="checkbox" id="hl-v" /> <span class="sw sw-v"></span> v-subdiagram (mountains Y)</label>
      <label class="hl-label"><input type="checkbox" id="hl-1" /> <span class="sw sw-1"></span> new 1-mountain</label>
      <span class="canvas-hint">Click a red dot to trace its northeast path (green = TCCW, red = not).</span>
    </div>

    <div class="cols">
      <div class="col-left">
        <figure class="diagram-block">
          <div class="diagram-wrap">
            <figcaption>w = <span id="cap-w"></span></figcaption>
            <svg id="diagram-w" xmlns="http://www.w3.org/2000/svg"></svg>
          </div>
        </figure>
        <figure class="diagram-block">
          <div class="diagram-wrap">
            <figcaption>v = <span id="cap-v"></span></figcaption>
            <svg id="diagram-v" xmlns="http://www.w3.org/2000/svg"></svg>
          </div>
        </figure>
      </div>
      <div class="col-right">
        <figure class="diagram-block">
          <div class="diagram-wrap">
            <figcaption>u = w&prime; 1 v&prime; = <span id="cap-u"></span></figcaption>
            <svg id="diagram-u" xmlns="http://www.w3.org/2000/svg"></svg>
          </div>
        </figure>
      </div>
    </div>
  </main>

  <script src="diagram.js"></script>
  <script src="construction.js"></script>
</body>
</html>
